name: Feature request
description: Suggest an idea for UP-TAKE
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        UP-TAKE is deliberately scoped to do a small number of things exceptionally well rather than
        chase feature parity with tools like ShareX. Requests that fit the "intentional capture, not
        surveillance" and "local-first" principles are the best fit.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do today that's hard, slow, or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like UP-TAKE to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried.
